<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialLens - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: #0f172a; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }
    .container { width: 100%; max-width: 400px; padding: 20px; }
    .logo { 
      width: 64px; height: 64px; 
      background: #6366f1; border-radius: 16px; 
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 40px; height: 40px; fill: white; }
    h1 { color: white; text-align: center; font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #94a3b8; text-align: center; margin-bottom: 24px; }
    .form { background: #1e293b; padding: 24px; border-radius: 16px; border: 1px solid #334155; }
    .input { width: 100%; padding: 12px 16px; margin-bottom: 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; }
    .input::placeholder { color: #64748b; }
    .btn { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #4f46e5; }
    .error { background: #ef4444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .success { background: #10b981; color: white; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M3 3v18h18M18 17V9M13 17V5M8 17v-3"/></svg>
    </div>
    <h1>Entrar no SocialLens</h1>
    <p>Acesse sua plataforma de social listening</p>
    <div class="form">
      <div id="error" class="error">E-mail ou senha inválidos</div>
      <div id="success" class="success">Login realizado com sucesso!</div>
      <input type="email" id="email" class="input" placeholder="seu@email.com" value="grsolucoesweb@gmail.com">
      <input type="password" id="password" class="input" placeholder="••••••••">
      <button class="btn" onclick="login()">Entrar</button>
    </div>
  </div>
  <script>
    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      
      if (email === 'grsolucoesweb@gmail.com' && password === '@Rebello290420') {
        success.style.display = 'block';
        error.style.display = 'none';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        error.style.display = 'block';
        success.style.display = 'none';
      }
    }
  </script>
</body>
</html>
